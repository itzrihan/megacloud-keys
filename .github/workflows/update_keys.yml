name: Update key

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # runs every 6 hours

permissions:
  contents: write

jobs:
  update_key:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes with rebase
        run: git pull origin main --rebase

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Create placeholder files if missing
        run: |
          [ -f key.txt ] || echo "" > key.txt
          [ -f rabbit.txt ] || echo "" > rabbit.txt

      - name: Run script to update key.txt
        env:
          API_KEY_1: ${{ secrets.API_KEY_1 }}
          API_KEY_2: ${{ secrets.API_KEY_2 }}
        run: node update_key.js

      - name: Commit and push updated files
        uses: EndBug/add-and-commit@v9
        with:
          add: "key.txt rabbit.txt"
          message: "Automated update of key"
          default_author: github_actions
          push: true
